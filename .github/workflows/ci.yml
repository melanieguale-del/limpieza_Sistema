name: CI - Tests

# Se ejecuta al abrir un Pull Request hacia main y en cada push a las ramas.
# Así main queda protegida: no se puede mergear si los tests fallan.
on:
  pull_request:
    branches: [ main ]
  push:
    branches-ignore: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER:juanita
        port:
         - 5432:6432
    
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar tests
        run: pytest -v
